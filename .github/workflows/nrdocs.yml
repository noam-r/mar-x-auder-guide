name: Publish Docs (nrdocs)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/nrdocs.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nrdocs CLI
        run: npm install -g nrdocs

      - name: Diagnose setup
        run: nrdocs doctor --ci
        env:
          NRDOCS_API_URL: https://nrdocs-default.nrdocs.workers.dev

      - name: Publish docs
        run: nrdocs publish --docs-dir docs
        env:
          NRDOCS_API_URL: https://nrdocs-default.nrdocs.workers.dev
          NRDOCS_DOCS_PASSWORD: ${{ secrets.NRDOCS_DOCS_PASSWORD }}
